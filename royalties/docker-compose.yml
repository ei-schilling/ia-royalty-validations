services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: validator
      POSTGRES_PASSWORD: validator
      POSTGRES_DB: validator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U validator"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://validator:validator@db:5432/validator
      UPLOAD_DIR: /app/uploads
      CORS_ORIGINS: '["http://localhost:5173","http://localhost"]'
      DMR_BASE: http://model-runner.docker.internal/engines/llama.cpp/v1
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin-pgpass:/pgadmin4/pgpass:ro

  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: royalties-anythingllm
    cap_add:
      - SYS_ADMIN
    environment:
      STORAGE_DIR: /app/server/storage
      # ── Connect to the project's PostgreSQL ──
      # AnythingLLM can use SQL agent skills to query this DB
      DATABASE_CONNECTION_STRING: postgresql://validator:validator@db:5432/validator
    ports:
      - "3001:3001"
    volumes:
      - anythingllm_storage:/app/server/storage
      - ./anythingllm.env:/app/server/.env
      # Share the uploads volume so AnythingLLM can read royalty docs
      - uploads:/app/server/storage/hotdir/royalty-docs:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
  anythingllm_storage:
  pgadmin_data:
